name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Release, Debug]
        platform: [x64]

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild /m /p:Configuration=${{matrix.configuration}} /p:Platform=${{matrix.platform}} /p:PlatformToolset=v143 cerf.sln

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cerf-${{matrix.configuration}}-${{matrix.platform}}
          path: ./build/

  e2e:
    runs-on: windows-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: cerf-Release-x64
          path: ./build/

      - name: Install Python deps
        run: pip install Pillow

      - name: Run e2e tests
        env:
          CI: "true"
        run: python e2e_tests/run_all.py
        timeout-minutes: 20

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: ./tmp/e2e_*.txt
